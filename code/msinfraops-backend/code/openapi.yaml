          title: JWT ID
          description: Unique identifier; can be used to prevent the JWT from being replayed (allows a token to be used only once)
          type: string
        exp:
          title: Expiration time
          description: Time after which the JWT expires
          type: integer
        nbf:
          title: Not before time
          description: Time before which the JWT must not be accepted for processing
          type: integer
        iat:
          title: Issued at time
          description: Time at which the JWT was issued; can be used to determine age of the JWT
          type: integer
        aut:
