name: Detect removed iteration

on:
  workflow_dispatch:
    inputs:
      project_number:
        description: 'Project number to scan'
        required: false
        default: '1'
  schedule:
    - cron: "0 0 * * *"

permissions:
  repository-projects: read
  issues: write
  contents: read

jobs:
  detect-iteration-removal:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Scan Project for removed Iterations
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
          script: |
            const PROJECT_ID = parseInt("${{ github.event.inputs.project_number }}");

            // Fetch all project items
            const projectItemsQuery = await github.graphql(`
              query($projectId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    items(first: 50) {
                      nodes {
                        id
                        content {
                          ... on Issue {
                            number
                            repository {
                              name
                              owner {
                                login
                              }
                            }
                          }
                        }
                        fieldValues(first: 20) {
                          nodes {
                            __typename
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              name
                              field { name }
                            }
                            ... on ProjectV2ItemFieldIterationValue {
                              title
                              field { name }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, { projectId: PROJECT_ID });

            for (const item of projectItemsQuery.node.items.nodes) {
              const sprintField = item.fieldValues.nodes.find(f => f.field?.name === "Sprint");

              const currentValue = sprintField
                ? sprintField.__typename === "ProjectV2ItemFieldSingleSelectValue"
                  ? sprintField.name
                  : sprintField.__typename === "ProjectV2ItemFieldIterationValue"
                    ? sprintField.title
                    : null
                : null;

              // Here we simulate previous value: assume if issue has a label "Had Sprint" it means last time it had value
              const issue = item.content;
              if (!issue) continue;

              const repoOwner = issue.repository.owner.login;
              const repoName = issue.repository.name;
              const issueNumber = issue.number;

              // Fetch labels to simulate "previous value"
              const { data: issueData } = await github.rest.issues.get({
                owner: repoOwner,
                repo: repoName,
                issue_number: issueNumber
              });

              const hadSprintBefore = issueData.labels.some(l => l.name === "Had Sprint");

              if (hadSprintBefore && !currentValue) {
                // Add comment
                await github.rest.issues.createComment({
                  owner: repoOwner,
                  repo: repoName,
                  issue_number: issueNumber,
                  body: "Sprint value has changed to empty"
                });

                console.log(`Comment added to #${issueNumber}`);
              }
            }