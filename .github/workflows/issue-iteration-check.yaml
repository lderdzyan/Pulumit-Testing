name: Detect Removed Sprint

on:
  workflow_dispatch:


permissions:
  id-token: write
  repository-projects: read
  issues: write
  contents: read

jobs:
  detect-state-removal:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - name: Assuming federated role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_FED_ROLE_ARN }}
          role-session-name: Federal

      - name: Install jq
        run: sudo apt update && sudo apt install -y jq

      - run: touch yesterday.txt

      - name: Copy Yesterday State File
        run: aws s3 cp s3://${{ secrets.BUCKET_NAME }}/yesterday.txt ./yesterday.txt

      - name: Run Sprint Script
        env:
          PROJECT_NUMBER: 1
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          GH_TOKEN: ${{ secrets.SCRIPT_GITHUB_TOKEN }}
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER}"  
          REPO="${GITHUB_REPOSITORY}"     
          REPO_NAME=${GITHUB_REPOSITORY#*/}
          gh api graphql -f query='
            query($owner: String!, $number: Int!) {
              user(login: $owner) {
                projectV2(number: $number) {
                  title
                  items(first: 100) {
                    nodes {
                      content {
                        ... on Issue {
                          number
                          title
                        }
                        ... on PullRequest {
                          number
                          title
                        }
                      }
                      fieldValues(first: 20) {
                        nodes {
                          __typename

                          ... on ProjectV2ItemFieldTextValue {
                            text
                            field {
                              ... on ProjectV2FieldCommon {
                                name
                              }
                            }
                          }

                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                            field {
                              ... on ProjectV2FieldCommon {
                                name
                              }
                            }
                          }

                          ... on ProjectV2ItemFieldIterationValue {
                            title
                            field {
                              ... on ProjectV2FieldCommon {
                                name
                              }
                            }
                          }

                          ... on ProjectV2ItemFieldNumberValue {
                            number
                            field {
                              ... on ProjectV2FieldCommon {
                                name
                              }
                            }
                          }

                          ... on ProjectV2ItemFieldDateValue {
                            date
                            field {
                              ... on ProjectV2FieldCommon {
                                name
                              }
                            }
                          }

                        }
                      }
                    }
                  }
                }
              }
            }
            ' -f owner="$OWNER" -F number=$PROJECT_NUMBER | jq -r '
            .data.user.projectV2.items.nodes[] |
              .content.number as $num |
              (
                [.fieldValues.nodes[]
                  | select(.field.name == "Sprint")
                  | .name
                ][0] // "NO_SPRINT"
              ) as $sprint |
              "\($num),\($sprint)"
            '| tee today.txt


      - name: Comment on Changed Issues
        env:          
          GH_TOKEN: ${{ secrets.SCRIPT_GITHUB_TOKEN }}
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER}"  
          REPO="${GITHUB_REPOSITORY}"     
          REPO_NAME=${GITHUB_REPOSITORY#*/}
          yesterday="yesterday.txt"
          today="today.txt"
          while IFS=, read -r issue sprint_y; do
            sprint_t=$(grep "^$issue," "$today" | cut -d',' -f2)
            if [[ "$sprint_y" != NO_SPRINT* && "$sprint_t" == NO_SPRINT* ]]; then
              echo "Missing sprint for issue: $issue"
              gh issue comment "$issue" \
            --repo "$OWNER/$REPO_NAME" \
            --body "⚠️ Sprint was removed from this issue"
            fi
          done < "$yesterday"

      - name: Save Todays State for Tomorrow
        run: |
          aws s3 cp ./today.txt s3://${{ secrets.BUCKET_NAME }}/yesterday.txt
