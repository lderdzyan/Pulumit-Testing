name: Detect removed iteration

on:
  workflow_dispatch:
    inputs:
      project_number:
        description: 'Project number to scan'
        required: false
        default: '1'
  schedule:
    - cron: "0 0 * * *"

permissions:
  repository-projects: read
  issues: write
  contents: read

jobs:
  detect-iteration-removal:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Scan Project for removed Iterations
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
          script: |
            const PROJECT_NUMBER = parseInt(context.payload.inputs?.project_number || '1', 10);
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Step 1: Get ProjectV2 Node ID from project number
            const projectRes = await github.graphql(`
              query($owner:String!, $repo:String!, $number:Int!) {
                repository(owner:$owner, name:$repo) {
                  projectV2(number:$number) { id }
                }
              }`, { owner, repo, number: PROJECT_NUMBER });

            const PROJECT_ID = projectRes.repository.projectV2?.id;
            if (!PROJECT_ID) return console.log("Project not found.");

            // Step 2: Fetch project items
            const projectItemsQuery = await github.graphql(`
              query($projectId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    items(first: 50) {
                      nodes {
                        id
                        content {
                          ... on Issue {
                            number
                            repository {
                              name
                              owner { login }
                            }
                          }
                        }
                        fieldValues(first: 20) {
                          nodes {
                            __typename
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              name
                              field { ... on ProjectV2SingleSelectField { name } }
                            }
                            ... on ProjectV2ItemFieldIterationValue {
                              title
                              field { ... on ProjectV2IterationField { name } }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, { projectId: PROJECT_ID });

            // Step 3: Check each item for Sprint removal
            for (const item of projectItemsQuery.node.items.nodes) {
              const sprintField = item.fieldValues.nodes.find(f => f.field?.name === "Sprint");
              const currentValue = sprintField
                ? sprintField.__typename === "ProjectV2ItemFieldSingleSelectValue"
                  ? sprintField.name
                  : sprintField.__typename === "ProjectV2ItemFieldIterationValue"
                    ? sprintField.title
                    : null
                : null;

              const issue = item.content;
              if (!issue) continue;

              const repoOwner = issue.repository.owner.login;
              const repoName = issue.repository.name;
              const issueNumber = issue.number;

              // Simulate previous value using label "Had Sprint"
              const { data: issueData } = await github.rest.issues.get({
                owner: repoOwner,
                repo: repoName,
                issue_number: issueNumber
              });

              const hadSprintBefore = issueData.labels.some(l => l.name === "Had Sprint");

              if (hadSprintBefore && !currentValue) {
                await github.rest.issues.createComment({
                  owner: repoOwner,
                  repo: repoName,
                  issue_number: issueNumber,
                  body: "Sprint value has changed to empty"
                });

                console.log(`Comment added to #${issueNumber}`);
              }
            }