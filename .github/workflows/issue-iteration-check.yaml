name: Detect removed iteration

on:
  workflow_dispatch:
    inputs:
      project_number:
        description: 'Project number to scan'
        required: false
        default: '1'
  schedule:
    - cron: "0 0 * * *"

permissions:
  repository-projects: read
  issues: write
  contents: read

jobs:
  detect-iteration-removal:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Scan Project for removed Iterations
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
          script: |
            const PROJECT_NUMBER = parseInt(context.payload.inputs?.project_number || '1', 10);
            const SPRINT_FIELD = "Sprint";
            const owner = context.repo.owner;

            // Step 1: Get ProjectV2 Node ID
            const projectRes = await github.graphql(`
              query ($owner: String!, $number: Int!) {
                user(login: $owner) {
                  projectV2(number: $number) {
                    id
                  }
                }
              }
            `, { owner, number: PROJECT_NUMBER });

            const PROJECT_ID = projectRes.user.projectV2?.id;
            if (!PROJECT_ID) return console.log("Project not found.");

            console.log(`Using Project ID: ${PROJECT_ID}`);

            // Step 2: Fetch all project items
            const boardRes = await github.graphql(`
              query ($projectId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue {
                            number
                            repository { name owner { login } }
                          }
                        }
                        fieldValues(first: 20) {
                          nodes {
                            __typename
                            ... on ProjectV2ItemFieldSingleSelectValue { field { ... on ProjectV2FieldCommon { name } } name }
                            ... on ProjectV2ItemFieldIterationValue { field { ... on ProjectV2FieldCommon { name } } title }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, { projectId: PROJECT_ID });

            const itemsToProcess = boardRes.node.items.nodes;

            for (const item of itemsToProcess) {
              const sprintField = item.fieldValues.nodes.find(f => f.field?.name === SPRINT_FIELD);
              const currentSprint = sprintField
                ? sprintField.__typename === "ProjectV2ItemFieldSingleSelectValue"
                  ? sprintField.name
                  : sprintField.__typename === "ProjectV2ItemFieldIterationValue"
                    ? sprintField.title
                    : null
                : null;

              const issue = item.content;
              if (!issue) continue;

              const repoOwner = issue.repository.owner.login;
              const repoName = issue.repository.name;
              const issueNumber = issue.number;

              // Simulate previous value using a label "Had Sprint"
              const { data: issueData } = await github.rest.issues.get({
                owner: repoOwner,
                repo: repoName,
                issue_number: issueNumber
              });

              const hadSprintBefore = issueData.labels.some(l => l.name === "Had Sprint");

              if (hadSprintBefore && !currentSprint) {
                await github.rest.issues.createComment({
                  owner: repoOwner,
                  repo: repoName,
                  issue_number: issueNumber,
                  body: "Sprint value has changed to empty"
                });

                console.log(`Comment added to #${issueNumber}`);
              }
            }