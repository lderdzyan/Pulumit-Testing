name: Detect removed iteration

on:
  workflow_dispatch:
    inputs:
      project_number:
        description: 'Project number to scan'
        required: false
        default: '1'
  schedule:
    - cron: "0 0 * * *"

permissions:
  repository-projects: read
  issues: write
  contents: read
jobs:
  detect-iteration-removal:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Scan Project for removed Iterations
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
          script: |
            const PROJECT_NUMBER = parseInt(context.payload.inputs?.project_number || '1', 10);
            const ITERATION_FIELD = "Iteration";

            console.log(`Scanning Project v2 number: ${PROJECT_NUMBER}`);

            const projectRes = await github.graphql(`
              query ($owner: String!, $number: Int!) {
                user(login: $owner) {
                  projectV2(number: $number) {
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue {
                            number
                            repository {
                              name
                              owner { login }
                            }
                          }
                        }
                        fieldValues(first: 100) {
                          nodes {
                            __typename
                            ... on ProjectV2ItemFieldIterationValue {
                              title
                              field { ... on ProjectV2FieldCommon { name } }
                            }
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              name
                              field { ... on ProjectV2FieldCommon { name } }
                            }
                            ... on ProjectV2ItemFieldTextValue {
                              text
                              field { ... on ProjectV2FieldCommon { name } }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, { owner: context.repo.owner, number: PROJECT_NUMBER });

            const items = projectRes.user.projectV2.items.nodes;

            for (const item of items) {
              // ✅ SAFE GUARD (fix crash)
              if (
                !item.content ||
                !item.content.repository ||
                !item.content.repository.owner
              ) {
                console.log(`Skipping item ${item.id}: not a valid issue`);
                continue;
              }

              const issue_owner = item.content.repository.owner.login;
              const issue_repo = item.content.repository.name;
              const issue_number = item.content.number;

              // ✅ Detect iteration correctly
              let iteration = null;

              for (const val of item.fieldValues.nodes) {
                if (!val.field) continue;

                if (
                  val.field.name === ITERATION_FIELD &&
                  val.__typename === "ProjectV2ItemFieldIterationValue"
                ) {
                  iteration = val.title;
                }
              }

              // ✅ If iteration exists → do nothing
              if (iteration) {
                console.log(`Issue #${issue_number} has iteration: ${iteration}`);
                continue;
              }

              // ✅ Get ALL comments (fix duplicate spam)
              const comments = await github.paginate(
                github.rest.issues.listComments,
                {
                  owner: issue_owner,
                  repo: issue_repo,
                  issue_number
                }
              );

              const alreadyCommented = comments.some(c =>
                c.body.includes("Iteration was removed from this issue")
              );

              if (alreadyCommented) {
                console.log(`Issue #${issue_number} already handled`);
                continue;
              }

              // ✅ Check if iteration existed before
              const timeline = await github.graphql(`
                query ($owner: String!, $repo: String!, $issue_number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $issue_number) {
                      timelineItems(first: 50) {
                        nodes {
                          __typename
                          ... on ProjectV2ItemFieldValueChangedEvent {
                            fieldName
                          }
                        }
                      }
                    }
                  }
                }
              `, {
                owner: issue_owner,
                repo: issue_repo,
                issue_number
              });

              const hadIterationBefore = timeline.repository.issue.timelineItems.nodes.some(
                e =>
                  e.__typename === "ProjectV2ItemFieldValueChangedEvent" &&
                  e.fieldName === ITERATION_FIELD
              );

              if (!hadIterationBefore) {
                console.log(`Issue #${issue_number} never had iteration → skip`);
                continue;
              }

              // ✅ REAL removal detected
              console.log(`Iteration removed from issue #${issue_number}, commenting...`);

              await github.rest.issues.createComment({
                owner: issue_owner,
                repo: issue_repo,
                issue_number,
                body: "⚠️ Iteration was removed from this issue in the project."
              });
            }